<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jo's List</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f16; font-family: 'Inter', system-ui, sans-serif; color: #e0e0f0; }
    input, select, textarea, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0f0f16; } ::-webkit-scrollbar-thumb { background: #2e2e3e; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ─── localStorage storage ─────────────────────────────────────────────────
    const KEY = "jos-list-v1";
    const load = () => { try { const r = localStorage.getItem(KEY); return r ? JSON.parse(r) : null; } catch { return null; } };
    const save = (d) => { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch {} };

    const DEFAULT = { recurring: [], todos: [], talking: [], archive: [], refs: [] };

    let _id = Date.now();
    const uid = () => String(++_id);

    // ─── Date helpers ─────────────────────────────────────────────────────────
    const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const todayDate = () => new Date();
    const fmtDate = (d) => new Date(d).toLocaleDateString("en-US", { month:"short", day:"numeric" });
    const fmtDeadline = (d) => {
      const now = new Date(); now.setHours(0,0,0,0);
      const dd = new Date(d); dd.setHours(0,0,0,0);
      const diff = Math.round((dd-now)/(1000*60*60*24));
      if (diff < 0) return { label:`${Math.abs(diff)}d overdue`, overdue:true };
      if (diff === 0) return { label:"Due today", overdue:true };
      if (diff === 1) return { label:"Due tomorrow", overdue:false };
      return { label:`Due ${fmtDate(d)}`, overdue:false };
    };
    const isOverdue = (nextDate) => nextDate && new Date(nextDate) < todayDate();

    function nextOccurrence(item) {
      const now = todayDate();
      if (item.freq === "weekly") {
        const d = new Date(now);
        const diff = (item.weekday - d.getDay() + 7) % 7 || 7;
        d.setDate(d.getDate() + diff); return d;
      }
      if (item.freq === "biweekly") {
        const base = item.lastDone ? new Date(item.lastDone) : new Date(now);
        const d = new Date(base); d.setDate(d.getDate() + 14); return d;
      }
      if (item.freq === "monthly") {
        const base = item.lastDone ? new Date(item.lastDone) : new Date(now);
        const d = new Date(base); d.setMonth(d.getMonth() + 1); return d;
      }
      return null;
    }

    // ─── LinkText ─────────────────────────────────────────────────────────────
    const URL_RE = /(https?:\/\/[^\s]+)/g;
    const ExternalLinkIcon = () => (
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
    );
    const linkBtnStyle = { display:"inline-flex",alignItems:"center",gap:4,background:"#1a2340",border:"1px solid #2a3a60",borderRadius:6,padding:"3px 9px",color:"#5b8ef0",fontSize:12,fontWeight:500,textDecoration:"none",verticalAlign:"middle",maxWidth:240,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" };
    function LinkText({ text, style={} }) {
      if (!text) return null;
      const parts = text.split(URL_RE);
      return <span style={style}>{parts.map((p,i) => URL_RE.test(p) ? <a key={i} href={p} target="_blank" rel="noreferrer" style={linkBtnStyle} onClick={e=>e.stopPropagation()}><ExternalLinkIcon />{p.replace(/^https?:\/\//,"").replace(/\/$/,"").slice(0,38)}</a> : p)}</span>;
    }

    // ─── Icons ────────────────────────────────────────────────────────────────
    const Icon = ({ n, size=16 }) => {
      const paths = {
        recurring:"M12 2v4l3-3 1.4 1.4L13 7.8A8 8 0 1 1 4.1 4.6L5.5 6A6 6 0 1 0 12 6V2z",
        todo:"M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11",
        talking:"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z",
        archive:"M21 8v13H3V8M1 3h22v5H1zM10 12h4",
        ref:"M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71",
        check:"M20 6L9 17l-5-5", trash:"M3 6h18M19 6l-1 14H6L5 6M9 6V4h6v2",
        edit:"M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z",
        x:"M18 6L6 18M6 6l12 12", star:"M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z",
        drag:"M8 6h1M8 12h1M8 18h1M14 6h1M14 12h1M14 18h1",
      };
      return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={paths[n]}/></svg>;
    };

    // ─── DraggableList ────────────────────────────────────────────────────────
    function DraggableList({ items, onReorder, renderItem }) {
      const [dragging, setDragging] = useState(null);
      const [over, setOver] = useState(null);
      const handleDragStart = (e, idx) => { setDragging(idx); e.dataTransfer.effectAllowed="move"; };
      const handleDragOver = (e, idx) => { e.preventDefault(); setOver(idx); };
      const handleDrop = (e, idx) => {
        e.preventDefault();
        if (dragging === null || dragging === idx) { setDragging(null); setOver(null); return; }
        const next = [...items];
        const [moved] = next.splice(dragging, 1);
        next.splice(idx, 0, moved);
        onReorder(next);
        setDragging(null); setOver(null);
      };
      return (
        <div>
          {items.map((item, idx) => (
            <div key={item.id} draggable
              onDragStart={e=>handleDragStart(e,idx)} onDragOver={e=>handleDragOver(e,idx)}
              onDrop={e=>handleDrop(e,idx)} onDragEnd={()=>{setDragging(null);setOver(null);}}
              style={{ opacity:dragging===idx?0.4:1, borderTop:over===idx&&dragging!==idx?"2px solid #5b8ef0":"2px solid transparent", transition:"border-color .1s" }}>
              {renderItem(item, idx)}
            </div>
          ))}
        </div>
      );
    }

    // ─── Shared styles ────────────────────────────────────────────────────────
    const inputStyle = { background:"#0f0f16",border:"1px solid #2e2e3e",borderRadius:8,padding:"8px 12px",color:"#e0e0f0",fontSize:13,width:"100%",boxSizing:"border-box" };
    const btnStyle = (bg, color) => ({ background:bg,border:`1px solid ${color}30`,borderRadius:8,color,padding:"10px 14px",cursor:"pointer",width:"100%",textAlign:"left",fontSize:13,marginTop:4 });
    const iconBtn = (bg,color) => ({ background:bg,border:"none",borderRadius:6,color,padding:"6px",cursor:"pointer",display:"flex",alignItems:"center",marginLeft:4 });
    const addBtn = { background:"#5b8ef0",border:"none",borderRadius:8,color:"#fff",padding:"8px 16px",cursor:"pointer",fontWeight:600,fontSize:13 };
    const cardStyle = { display:"flex",alignItems:"center",gap:8,background:"#14141e",border:"1px solid #1e1e2e",borderRadius:10,padding:"12px 14px",marginBottom:8 };
    const Empty = ({text}) => <div style={{ color:"#444",fontSize:13,textAlign:"center",padding:"40px 0" }}>{text}</div>;
    const DeadlineBadge = ({ deadline }) => {
      if (!deadline) return null;
      const { label, overdue } = fmtDeadline(deadline);
      return <span style={{ fontSize:11,fontWeight:500,borderRadius:20,padding:"2px 8px",background:overdue?"#3d1a1a":"#1a2a1a",color:overdue?"#f07070":"#6bc87a",whiteSpace:"nowrap",flexShrink:0 }}>{label}</span>;
    };

    // ─── Modal ────────────────────────────────────────────────────────────────
    function Modal({ title, onClose, children }) {
      return (
        <div style={{ position:"fixed",inset:0,background:"rgba(10,10,20,0.6)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px" }} onClick={onClose}>
          <div style={{ background:"#18181f",border:"1px solid #2e2e3e",borderRadius:14,padding:"24px",width:"100%",maxWidth:480,boxShadow:"0 24px 60px rgba(0,0,0,.5)",maxHeight:"90vh",overflowY:"auto" }} onClick={e=>e.stopPropagation()}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20 }}>
              <span style={{ fontWeight:600,fontSize:16,color:"#e8e8f0" }}>{title}</span>
              <button onClick={onClose} style={{ background:"none",border:"none",color:"#666",cursor:"pointer",padding:4 }}><Icon n="x" /></button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    // ─── CheckoutModal ────────────────────────────────────────────────────────
    function CheckoutModal({ item, onClose, onArchive, onRef }) {
      const [url,setUrl]=useState(""); const [note,setNote]=useState("");
      return (
        <Modal title="Mark complete" onClose={onClose}>
          <p style={{ color:"#888",fontSize:13,marginBottom:16 }}>Done with <strong style={{color:"#c8c8e0"}}>"{item.text}"</strong>?</p>
          <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
            <button onClick={onArchive} style={btnStyle("#2a2a3a","#888")}>Archive it — I may want to look back</button>
            <div style={{ borderTop:"1px solid #2e2e3e",paddingTop:12 }}>
              <p style={{ color:"#aaa",fontSize:12,marginBottom:8 }}>Save to Reference tab (optional URL + note)</p>
              <input placeholder="URL (optional)" value={url} onChange={e=>setUrl(e.target.value)} style={inputStyle} />
              <input placeholder="Note (optional)" value={note} onChange={e=>setNote(e.target.value)} style={{...inputStyle,marginTop:8}} />
              <button onClick={()=>onRef(url,note)} style={btnStyle("#1e2a3a","#5b8ef0")}>Add to Reference & Archive</button>
            </div>
            <button onClick={onClose} style={btnStyle("#1a1a22","#555")}>Just delete it</button>
          </div>
        </Modal>
      );
    }

    // ─── TodoForm ─────────────────────────────────────────────────────────────
    function TodoForm({ onSave, onClose, existing }) {
      const [text,setText]=useState(existing?.text||"");
      const [deadline,setDeadline]=useState(existing?.deadline||"");
      const handleSave = () => {
        if (!text.trim()) return;
        onSave({ id:existing?.id||uid(), text:text.trim(), deadline:deadline||null, addedAt:existing?.addedAt||new Date().toISOString() });
        onClose();
      };
      return (
        <Modal title={existing?"Edit task":"Add task"} onClose={onClose}>
          <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
            <textarea autoFocus placeholder="What needs to be done?" value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"&&e.shiftKey){ e.preventDefault(); handleSave(); }}} rows={3} style={{...inputStyle,resize:"vertical",lineHeight:1.5}} />
            <label style={{ fontSize:12,color:"#666" }}>
              Deadline <span style={{ color:"#444" }}>(optional)</span>
              <input type="date" value={deadline||""} onChange={e=>setDeadline(e.target.value)} style={{...inputStyle,marginTop:4,colorScheme:"dark"}} />
            </label>
            {deadline && <button onClick={()=>setDeadline("")} style={{ background:"none",border:"none",color:"#555",fontSize:12,cursor:"pointer",textAlign:"left",padding:0 }}>✕ Remove deadline</button>}
            <button disabled={!text.trim()} onClick={handleSave} style={{ background:"#5b8ef0",color:"#fff",border:"none",borderRadius:8,padding:"10px",cursor:"pointer",fontWeight:600 }}>{existing?"Save changes":"Add task"}</button>
            <span style={{ fontSize:11,color:"#444",textAlign:"center" }}>Shift + Enter to save</span>
          </div>
        </Modal>
      );
    }

    // ─── RecurringForm ────────────────────────────────────────────────────────
    function RecurringForm({ onSave, onClose, existing }) {
      const [text,setText]=useState(existing?.text||"");
      const [freq,setFreq]=useState(existing?.freq||"weekly");
      const [weekday,setWeekday]=useState(existing?.weekday??1);
      const [deadline,setDeadline]=useState(existing?.deadline||"");
      const handleSave = () => {
        if (!text.trim()) return;
        onSave({ id:existing?.id||uid(), text:text.trim(), freq, weekday, lastDone:existing?.lastDone||null, deadline:deadline||null });
        onClose();
      };
      return (
        <Modal title={existing?"Edit reminder":"Add recurring reminder"} onClose={onClose}>
          <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
            <textarea autoFocus placeholder="What needs to happen?" value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"&&e.shiftKey){ e.preventDefault(); handleSave(); }}} rows={2} style={{...inputStyle,resize:"vertical",lineHeight:1.5}} />
            <select value={freq} onChange={e=>setFreq(e.target.value)} style={inputStyle}>
              <option value="weekly">Weekly</option>
              <option value="biweekly">Every 2 weeks</option>
              <option value="monthly">Monthly (same weekday)</option>
            </select>
            <select value={weekday} onChange={e=>setWeekday(Number(e.target.value))} style={inputStyle}>
              {DAYS.map((d,i)=><option key={d} value={i}>{d}</option>)}
            </select>
            <label style={{ fontSize:12,color:"#666" }}>
              Hard deadline <span style={{ color:"#444" }}>(optional)</span>
              <input type="date" value={deadline||""} onChange={e=>setDeadline(e.target.value)} style={{...inputStyle,marginTop:4,colorScheme:"dark"}} />
            </label>
            {deadline && <button onClick={()=>setDeadline("")} style={{ background:"none",border:"none",color:"#555",fontSize:12,cursor:"pointer",textAlign:"left",padding:0 }}>✕ Remove deadline</button>}
            <button disabled={!text.trim()} onClick={handleSave} style={{ background:"#5b8ef0",color:"#fff",border:"none",borderRadius:8,padding:"10px",cursor:"pointer",fontWeight:600 }}>{existing?"Save changes":"Add reminder"}</button>
            <span style={{ fontSize:11,color:"#444",textAlign:"center" }}>Shift + Enter to save</span>
          </div>
        </Modal>
      );
    }

    // ─── TalkingForm ──────────────────────────────────────────────────────────
    function TalkingForm({ onAdd, onClose, existing }) {
      const [topic,setTopic]=useState(existing?.topic||"");
      const [points,setPoints]=useState(existing?.points||[""]);
      const addPoint = () => setPoints(p=>[...p,""]);
      const setPoint = (i,v) => setPoints(p=>p.map((x,j)=>j===i?v:x));
      const removePoint = (i) => setPoints(p=>p.filter((_,j)=>j!==i));
      return (
        <Modal title={existing?"Edit talking points":"New talking points"} onClose={onClose}>
          <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
            <input autoFocus placeholder="Topic / meeting name" value={topic} onChange={e=>setTopic(e.target.value)} style={inputStyle} />
            {points.map((p,i)=>(
              <div key={i} style={{ display:"flex",gap:6,alignItems:"flex-start" }}>
                <textarea placeholder={`Point ${i+1}`} value={p} onChange={e=>setPoint(i,e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); addPoint(); }}} rows={2} style={{...inputStyle,flex:1,resize:"vertical",lineHeight:1.5}} />
                {points.length>1 && <button onClick={()=>removePoint(i)} style={{ background:"none",border:"none",color:"#666",cursor:"pointer",marginTop:6 }}><Icon n="x" size={14}/></button>}
              </div>
            ))}
            <button onClick={addPoint} style={{ background:"none",border:"1px dashed #3e3e5e",borderRadius:8,color:"#666",padding:"8px",cursor:"pointer",fontSize:12 }}>+ Add point</button>
            <button disabled={!topic.trim()} onClick={()=>{onAdd({id:existing?.id||uid(),topic:topic.trim(),points:points.filter(p=>p.trim()),done:false});onClose();}} style={{ background:"#5b8ef0",color:"#fff",border:"none",borderRadius:8,padding:"10px",cursor:"pointer",fontWeight:600 }}>{existing?"Save changes":"Add talking points"}</button>
          </div>
        </Modal>
      );
    }

    // ─── RefForm ─────────────────────────────────────────────────────────────
    function RefForm({ onSave, onClose, existing }) {
      const [title,setTitle]=useState(existing?.title||"");
      const [url,setUrl]=useState(existing?.url||"");
      const [note,setNote]=useState(existing?.note||"");
      const handleSave = () => {
        if (!title.trim()) return;
        onSave({ id:existing?.id||uid(), title:title.trim(), url, note, addedAt:existing?.addedAt||new Date().toISOString() });
        onClose();
      };
      return (
        <Modal title={existing?"Edit reference":"Add reference"} onClose={onClose}>
          <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
            <input autoFocus placeholder="Title" value={title} onChange={e=>setTitle(e.target.value)} style={inputStyle} />
            <input placeholder="URL (optional)" value={url} onChange={e=>setUrl(e.target.value)} style={inputStyle} />
            <textarea placeholder="Note (optional)" value={note} onChange={e=>setNote(e.target.value)} rows={3} style={{...inputStyle,resize:"vertical",lineHeight:1.5}} />
            <button disabled={!title.trim()} onClick={handleSave} style={{ background:"#5b8ef0",color:"#fff",border:"none",borderRadius:8,padding:"10px",cursor:"pointer",fontWeight:600 }}>{existing?"Save changes":"Save"}</button>
          </div>
        </Modal>
      );
    }

    // ─── Main App ─────────────────────────────────────────────────────────────
    function App() {
      const [data, setData] = useState(DEFAULT);
      const [loaded, setLoaded] = useState(false);
      const [tab, setTab] = useState("todos");
      const [modal, setModal] = useState(null);
      const [checkoutItem, setCheckoutItem] = useState(null);
      const [editTalking, setEditTalking] = useState(null);
      const [editTodo, setEditTodo] = useState(null);
      const [editRecurring, setEditRecurring] = useState(null);
      const [editRef, setEditRef] = useState(null);

      useEffect(() => {
        const d = load();
        if (d) setData(d);
        setLoaded(true);
      }, []);

      const update = useCallback((fn) => {
        setData(prev => { const next = fn(prev); save(next); return next; });
      }, []);

      if (!loaded) return <div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#555" }}>Loading…</div>;

      const saveTodo = (item) => update(d => { const ex=d.todos.find(t=>t.id===item.id); return {...d,todos:ex?d.todos.map(t=>t.id===item.id?item:t):[...d.todos,item]}; });
      const reorderTodos = (next) => update(d=>({...d,todos:next}));
      const openCheckout = (item) => setCheckoutItem(item);
      const finishCheckout = (item, action, url, note) => {
        setCheckoutItem(null);
        update(d => {
          const todos = d.todos.filter(t=>t.id!==item.id);
          let archive = d.archive, refs = d.refs;
          if (action==="archive"||action==="ref") archive=[...archive,{...item,archivedAt:new Date().toISOString()}];
          if (action==="ref") refs=[...refs,{id:uid(),title:item.text,url:url||"",note:note||"",addedAt:new Date().toISOString()}];
          return {...d,todos,archive,refs};
        });
      };

      const saveRecurring = (item) => update(d => { const ex=d.recurring.find(r=>r.id===item.id); return {...d,recurring:ex?d.recurring.map(r=>r.id===item.id?item:r):[...d.recurring,item]}; });
      const doneRecurring = (item) => update(d=>({...d,recurring:d.recurring.map(r=>r.id===item.id?{...r,lastDone:new Date().toISOString()}:r)}));
      const delRecurring = (id) => update(d=>({...d,recurring:d.recurring.filter(r=>r.id!==id)}));
      const reorderRecurring = (next) => update(d=>({...d,recurring:next}));

      const saveTalking = (item) => update(d => { const ex=d.talking.find(t=>t.id===item.id); return {...d,talking:ex?d.talking.map(t=>t.id===item.id?item:t):[...d.talking,item]}; });
      const delTalking = (id) => update(d=>({...d,talking:d.talking.filter(t=>t.id!==id)}));

      const saveRef = (item) => update(d => { const ex=d.refs.find(r=>r.id===item.id); return {...d,refs:ex?d.refs.map(r=>r.id===item.id?item:r):[...d.refs,item]}; });
      const delRef = (id) => update(d=>({...d,refs:d.refs.filter(r=>r.id!==id)}));

      const totalOverdue = data.todos.filter(t=>t.deadline&&isOverdue(t.deadline)).length + data.recurring.filter(r=>isOverdue(nextOccurrence(r))).length;

      const tabs = [
        { id:"todos", label:"To-Do", icon:"todo" },
        { id:"recurring", label:"Recurring", icon:"recurring" },
        { id:"talking", label:"Talking", icon:"talking" },
        { id:"archive", label:"Archive", icon:"archive" },
        { id:"refs", label:"Reference", icon:"ref" },
      ];

      return (
        <div style={{ background:"#0f0f16",minHeight:"100vh" }}>
          <div style={{ borderBottom:"1px solid #1e1e2e",padding:"18px 24px 0",maxWidth:760,margin:"0 auto" }}>
            <div style={{ display:"flex",alignItems:"baseline",gap:12,marginBottom:16 }}>
              <span style={{ fontSize:20,fontWeight:700,letterSpacing:-0.5 }}>Jo's List</span>
              {totalOverdue>0 && <span style={{ background:"#3d1a1a",color:"#f07070",fontSize:11,borderRadius:20,padding:"2px 10px",fontWeight:600 }}>{totalOverdue} overdue</span>}
            </div>
            <div style={{ display:"flex",gap:4,flexWrap:"wrap" }}>
              {tabs.map(t=>(
                <button key={t.id} onClick={()=>setTab(t.id)} style={{ background:"none",border:"none",cursor:"pointer",padding:"8px 14px",borderBottom:tab===t.id?"2px solid #5b8ef0":"2px solid transparent",color:tab===t.id?"#5b8ef0":"#666",fontSize:13,fontWeight:tab===t.id?600:400,display:"flex",alignItems:"center",gap:6 }}>
                  <Icon n={t.icon} size={13}/>{t.label}
                </button>
              ))}
            </div>
          </div>

          <div style={{ maxWidth:760,margin:"0 auto",padding:"24px" }}>

            {tab==="todos" && (
              <div>
                <div style={{ display:"flex",justifyContent:"flex-end",marginBottom:20 }}>
                  <button onClick={()=>setModal({type:"todo"})} style={addBtn}>+ Add task</button>
                </div>
                {data.todos.length===0 && <Empty text="No tasks yet — add one above." />}
                <DraggableList items={data.todos} onReorder={reorderTodos} renderItem={(item)=>(
                  <div style={cardStyle}>
                    <span style={{ color:"#333",cursor:"grab",flexShrink:0,display:"flex",alignItems:"center" }}><Icon n="drag" size={14}/></span>
                    <div style={{ flex:1,minWidth:0 }}>
                      <LinkText text={item.text} style={{ fontSize:14,display:"block" }} />
                      {item.deadline && <DeadlineBadge deadline={item.deadline} />}
                    </div>
                    <button onClick={()=>setEditTodo(item)} title="Edit" style={iconBtn("#1e2a3a","#5b8ef0")}><Icon n="edit" size={14}/></button>
                    <button onClick={()=>openCheckout(item)} title="Complete" style={iconBtn("#1c3a1c","#5bc87a")}><Icon n="check" size={14}/></button>
                    <button onClick={()=>update(d=>({...d,todos:d.todos.filter(t=>t.id!==item.id)}))} title="Delete" style={iconBtn("#2a1a1a","#c87070")}><Icon n="trash" size={14}/></button>
                  </div>
                )} />
              </div>
            )}

            {tab==="recurring" && (
              <div>
                <div style={{ display:"flex",justifyContent:"flex-end",marginBottom:20 }}>
                  <button onClick={()=>setModal({type:"recurring"})} style={addBtn}>+ New reminder</button>
                </div>
                {data.recurring.length===0 && <Empty text="No recurring reminders yet." />}
                <DraggableList items={data.recurring} onReorder={reorderRecurring} renderItem={(item)=>{
                  const next = nextOccurrence(item);
                  const od = isOverdue(next);
                  return (
                    <div style={{...cardStyle,borderLeft:`3px solid ${od?"#c87070":"#2e2e4e"}`}}>
                      <span style={{ color:"#333",cursor:"grab",flexShrink:0,display:"flex",alignItems:"center" }}><Icon n="drag" size={14}/></span>
                      <div style={{ flex:1,minWidth:0 }}>
                        <div style={{ fontSize:14,marginBottom:4 }}><LinkText text={item.text} /></div>
                        <div style={{ display:"flex",flexWrap:"wrap",alignItems:"center",gap:6 }}>
                          <span style={{ fontSize:11,color:od?"#c87070":"#555" }}>
                            {item.freq==="weekly"?"Weekly":item.freq==="biweekly"?"Every 2 weeks":"Monthly"} · {DAYS[item.weekday]}
                            {next && ` · ${od?"Overdue since":"Next"} ${fmtDate(next)}`}
                          </span>
                          {item.deadline && <DeadlineBadge deadline={item.deadline} />}
                        </div>
                      </div>
                      <button onClick={()=>setEditRecurring(item)} title="Edit" style={iconBtn("#1e2a3a","#5b8ef0")}><Icon n="edit" size={14}/></button>
                      <button onClick={()=>doneRecurring(item)} title="Mark done" style={iconBtn("#1c3a1c","#5bc87a")}><Icon n="check" size={14}/></button>
                      <button onClick={()=>delRecurring(item.id)} title="Delete" style={iconBtn("#2a1a1a","#c87070")}><Icon n="trash" size={14}/></button>
                    </div>
                  );
                }} />
              </div>
            )}

            {tab==="talking" && (
              <div>
                <div style={{ display:"flex",justifyContent:"flex-end",marginBottom:20 }}>
                  <button onClick={()=>setModal({type:"talking"})} style={addBtn}>+ New topic</button>
                </div>
                {data.talking.length===0 && <Empty text="No talking points yet." />}
                {data.talking.map(item=>(
                  <div key={item.id} style={{...cardStyle,flexDirection:"column",alignItems:"flex-start",gap:10}}>
                    <div style={{ display:"flex",width:"100%",alignItems:"center" }}>
                      <span style={{ flex:1,fontWeight:600,fontSize:14 }}><LinkText text={item.topic} /></span>
                      <button onClick={()=>setEditTalking(item)} style={iconBtn("#1e2a3a","#5b8ef0")}><Icon n="edit" size={14}/></button>
                      <button onClick={()=>delTalking(item.id)} style={iconBtn("#2a1a1a","#c87070")}><Icon n="trash" size={14}/></button>
                    </div>
                    <ul style={{ margin:0,paddingLeft:18,listStyle:"disc" }}>
                      {item.points.map((p,i)=><li key={i} style={{ fontSize:13,color:"#aaa",marginBottom:3 }}><LinkText text={p} /></li>)}
                    </ul>
                  </div>
                ))}
              </div>
            )}

            {tab==="archive" && (
              <div>
                {data.archive.length===0 && <Empty text="Completed tasks will appear here." />}
                {[...data.archive].reverse().map(item=>(
                  <div key={item.id} style={{...cardStyle,opacity:0.7}}>
                    <LinkText text={item.text} style={{ flex:1,fontSize:13,textDecoration:"line-through",color:"#666" }} />
                    <span style={{ fontSize:11,color:"#444" }}>{fmtDate(item.archivedAt)}</span>
                  </div>
                ))}
              </div>
            )}

            {tab==="refs" && (
              <div>
                <div style={{ display:"flex",justifyContent:"flex-end",marginBottom:20 }}>
                  <button onClick={()=>setModal({type:"ref"})} style={addBtn}>+ Add reference</button>
                </div>
                {data.refs.length===0 && <Empty text="Saved references will appear here." />}
                {[...data.refs].reverse().map(item=>(
                  <div key={item.id} style={{...cardStyle,flexDirection:"column",alignItems:"flex-start",gap:8,padding:"14px 16px"}}>
                    <div style={{ display:"flex",width:"100%",alignItems:"center",gap:8 }}>
                      <Icon n="star" size={13} />
                      <span style={{ flex:1,fontSize:14,fontWeight:600 }}>{item.title}</span>
                      <span style={{ fontSize:11,color:"#444" }}>{fmtDate(item.addedAt)}</span>
                      <button onClick={()=>setEditRef(item)} style={iconBtn("#1e2a3a","#5b8ef0")}><Icon n="edit" size={14}/></button>
                      <button onClick={()=>delRef(item.id)} style={iconBtn("#2a1a1a","#c87070")}><Icon n="trash" size={14}/></button>
                    </div>
                    {item.note && <span style={{ fontSize:12,color:"#888",paddingLeft:21,whiteSpace:"pre-wrap" }}>{item.note}</span>}
                    {item.url && (
                      <a href={item.url} target="_blank" rel="noreferrer" style={{ display:"inline-flex",alignItems:"center",gap:6,marginLeft:21,background:"#1a2340",border:"1px solid #2a3a60",borderRadius:8,padding:"7px 14px",color:"#5b8ef0",fontSize:13,fontWeight:500,textDecoration:"none",maxWidth:"calc(100% - 21px)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>
                        <ExternalLinkIcon />{item.url.replace(/^https?:\/\//,"").replace(/\/$/,"")}
                      </a>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>

          {modal?.type==="todo" && <TodoForm onClose={()=>setModal(null)} onSave={saveTodo} />}
          {modal?.type==="recurring" && <RecurringForm onClose={()=>setModal(null)} onSave={saveRecurring} />}
          {modal?.type==="talking" && <TalkingForm onClose={()=>setModal(null)} onAdd={saveTalking} />}
          {modal?.type==="ref" && <RefForm onClose={()=>setModal(null)} onSave={saveRef} />}
          {editTodo && <TodoForm existing={editTodo} onClose={()=>setEditTodo(null)} onSave={item=>{saveTodo(item);setEditTodo(null);}} />}
          {editRecurring && <RecurringForm existing={editRecurring} onClose={()=>setEditRecurring(null)} onSave={item=>{saveRecurring(item);setEditRecurring(null);}} />}
          {editTalking && <TalkingForm existing={editTalking} onClose={()=>setEditTalking(null)} onAdd={item=>{saveTalking(item);setEditTalking(null);}} />}
          {editRef && <RefForm existing={editRef} onClose={()=>setEditRef(null)} onSave={item=>{saveRef(item);setEditRef(null);}} />}
          {checkoutItem && <CheckoutModal item={checkoutItem} onClose={()=>setCheckoutItem(null)} onArchive={()=>finishCheckout(checkoutItem,"archive")} onRef={(url,note)=>finishCheckout(checkoutItem,"ref",url,note)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
