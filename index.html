<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jo's Space 🌙</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Inter', sans-serif;
      background: #0f0f1a;
      overflow: hidden;
    }

    /* animated starfield */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
      opacity: 0;
    }
    @keyframes twinkle {
      from { opacity: 0.1; transform: scale(1); }
      to   { opacity: 0.9; transform: scale(1.4); }
    }

    /* blob glow */
    .glow {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .glow-1 { background: #a855f7; top: -100px; left: -100px; }
    .glow-2 { background: #3b82f6; bottom: -100px; right: -100px; animation-delay: -6s; }
    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(40px, 30px); }
    }

    /* card */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 2.8rem 2.4rem 2.4rem;
      max-width: 420px;
      width: calc(100% - 2rem);
      text-align: center;
    }

    .emoji-big {
      font-size: 3.2rem;
      line-height: 1;
      margin-bottom: 1rem;
      display: block;
      animation: bob 3s ease-in-out infinite;
    }
    @keyframes bob {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.4rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 0.4rem;
      background: linear-gradient(135deg, #fff 30%, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 2rem;
      letter-spacing: 0.04em;
    }

    /* big button */
    .big-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      color: #fff;
      border-radius: 16px;
      padding: 1.1rem 1.4rem;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 8px 30px rgba(124,58,237,0.35);
      position: relative;
      overflow: hidden;
    }

    .big-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.12);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .big-btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 14px 40px rgba(124,58,237,0.5); }
    .big-btn:hover::before { opacity: 1; }
    .big-btn:active { transform: scale(0.98); }

    .btn-left { display: flex; align-items: center; gap: 0.75rem; }
    .btn-icon {
      font-size: 1.5rem;
      width: 42px;
      height: 42px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      display: grid;
      place-items: center;
    }
    .btn-arrow { font-size: 1.2rem; opacity: 0.8; }

    .hint {
      margin-top: 1.6rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
    }

    @media (max-width: 380px) {
      h1 { font-size: 2rem; }
      .card { padding: 2rem 1.4rem; }
    }
  </style>
</head>
<body>

  <!-- stars -->
  <div class="stars" id="stars"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <main class="card">
    <span class="emoji-big">🌙</span>
    <h1>Hey Jo!</h1>
    <p class="tagline">your personal corner of the internet</p>

    <a href="jos-list.html" class="big-btn">
      <span class="btn-left">
        <span class="btn-icon">✅</span>
        Jo's To Do List
      </span>
      <span class="btn-arrow">→</span>
    </a>

    <p class="hint">more pages coming soon ✨</p>
  </main>

  <script>
    // sprinkle stars
    const container = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2.5 + 0.5;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%;
        left:${Math.random()*100}%;
        --d:${(Math.random()*4+1.5).toFixed(1)}s;
        animation-delay:${(Math.random()*5).toFixed(1)}s;
      `;
      container.appendChild(s);
    }
  </script>

</body>
</html>
